version: "3.9"

services:
  api:
    build: .
    image: llm-backend-image
    container_name: rag-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: always

  worker:
    build: .
    image: llm-backend-image
    container_name: rag-worker
    command: python -u -m workers.ingest_worker
    env_file:
      - .env
    restart: always
